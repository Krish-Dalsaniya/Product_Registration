name: Deploy Testing to DigitalOcean

on:
  push:
    branches:
      - testing

concurrency:
  group: product-registration-testing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          set -x

          mkdir -p ~/.ssh

          cat > ~/.ssh/do_key << 'EOF'
          ${{ secrets.DO_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/do_key

          ssh-keyscan -p "${{ secrets.DO_PORT }}" -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Testing on DigitalOcean
        run: |
          ssh -i ~/.ssh/do_key \
              -o StrictHostKeyChecking=yes \
              -p "${{ secrets.DO_PORT }}" \
              "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" << 'EOF'

            set -e

            APP_DIR="/var/www/product-registration-app-testing"
            BRANCH="testing"
            NODE_OPTIONS_VALUE="--dns-result-order=ipv4first --no-network-family-autoselection"

            echo "Going to app directory..."
            cd "$APP_DIR"

            echo "Checking required .env files..."
            test -f backend/.env
            test -f frontend/.env

            echo "Cleaning local changes..."
            git reset --hard
            git clean -fd

            echo "Pulling latest code..."
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            echo "Installing backend dependencies..."
            cd "$APP_DIR/backend"

            npm ci || npm install

            echo "Installing frontend dependencies..."
            cd "$APP_DIR/frontend"

            npm ci || npm install

            echo "Building frontend..."
            npm run build

            echo "Running database migration..."
            cd "$APP_DIR/backend"

            if [ -f database/migration.sql ]; then
              sudo -u postgres psql -d product_registration_testing -f database/migration.sql
            fi

            echo "Restarting testing backend..."
            cd "$APP_DIR/backend"

            NODE_OPTIONS="$NODE_OPTIONS_VALUE" pm2 restart product-registration-backend-testing --update-env || \
            NODE_OPTIONS="$NODE_OPTIONS_VALUE" pm2 start src/server.js --name product-registration-backend-testing

            pm2 save

            nginx -t
            systemctl reload nginx

            echo "Testing deployment completed successfully."
          EOF
